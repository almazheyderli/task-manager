spring.application.name=taskflow-api
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/taskflow_java

# JWT
app.jwt.secret=taskflow-java-super-secret-key-2024-change-in-production-min-256bit
app.jwt.expiration=604800000

# App Info
app.version=1.0.0
app.name=TaskFlow Java

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=${app.name}
info.app.version=${app.version}

# CORS (Next.js dev server)
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.taskflow=INFO
